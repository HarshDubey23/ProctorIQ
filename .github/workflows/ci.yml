name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff mypy
      - name: Lint with ruff
        run: cd backend && ruff check .
      - name: Type check with mypy
        run: cd backend && mypy . --strict
      - name: Run tests
        run: cd backend && pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Use matching npm version
        run: npm install -g npm@11.13.0
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Lint
        run: cd frontend && npm run lint
      - name: Type check
        run: cd frontend && npx tsc --noEmit
      - name: Unit tests
        run: cd frontend && npm run test
      - name: Build
        run: cd frontend && npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Use matching npm version
        run: npm install -g npm@11.13.0
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install chromium
      - name: Start backend
        env:
          CORS_ORIGINS: '["http://localhost:4173","http://localhost:5173"]'
        run: |
          pip install -r backend/requirements.txt
          uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 1 &
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to become ready after 30s" >&2
          exit 1
      - name: Build frontend
        env:
          VITE_API_URL: 'http://localhost:8000'
        run: |
          cd frontend
          npm run build
      - name: Run Playwright E2E tests
        run: |
          cd frontend
          npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
